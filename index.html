<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
  <a-scene embedded arjs="trackingMethod: best; sourceType: webcam;">
    
    <a-nft
      type="nft"
      url="https://ug323788-cmd.github.io/AR/usman"
      smooth="true"
       smoothCount="10"
  smoothTolerance="0.01"
  smoothThreshold="5"
    >
      <a-entity
        gltf-model="https://ug323788-cmd.github.io/AR/model.glb"
        scale="10 10 10"
        position="0 0.2 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"
      ></a-entity>
      <a-entity light="type: ambient; intensity: 1"></a-entity>
<a-entity light="type: directional; intensity: 1" position="0 1 1"></a-entity>
    </a-nft>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
